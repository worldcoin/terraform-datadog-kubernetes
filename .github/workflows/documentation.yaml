name: Generate terraform docs

on:
  push:
    # don't run when we push a tag
    tags-ignore:
      - "*"
    # don't run when we merge to main
    # the action should have run already
    branches-ignore:
      - "main"
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.8.5"
      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93
        name: Setup TFLint
        with:
          tflint_version: v0.38.1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd
        # pre-commit fails if it changed files
        # we want to go on
        continue-on-error: true
      - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321
        with:
          default_author: github_actions
